<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modules</title>
</head>

<body>
    <section id="calcSection">
        <h2>Calculator</h2>
        <input type="number" id="firstNum">
        <br>
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
        <br>
        <input type="number" id="secondNum">
        <br>
        <p>=</p>
        <input type="number" id="output" readonly>


    </section>
    <!-- Need to set this script file to be a module to enable import/export -->
    <script src="./index.js" type="module"></script>
</body>

</html>
